<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>JetLoader 3D — coupling</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }
    canvas { width: 100vw; height: 100vh; display: block; }
    #summary { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,.92);
      padding: 10px 12px; font: 13px/1.4 sans-serif; border-radius: 6px; max-width: 260px; }
    #summary table { border-collapse: collapse; margin-top: 6px; width: 100%; }
    #summary th, #summary td { border: 1px solid #ddd; padding: 2px 6px; text-align: left; }
    #summary .overload { color: #e15759; font-weight: bold; }
  </style>
  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
  } }
  </script>
</head>
<body>
  <canvas></canvas>
  <div id="summary"></div>
  <script type="module">
    import { extractResult, sceneFromResult } from '../shared/sceneFromResult.js';
    import { summarize } from '../shared/summary.js';
    import { mountViewer } from '../shared/viewer.js';
    import { renderSummary } from '../shared/summaryPanel.js';
    import { axleMarkers } from '../shared/axles.js';
    const response = await fetch('../samples/coupling/response.json')
      .then((r) => { if (!r.ok) throw new Error('sample HTTP ' + r.status); return r.json(); });
    const result = extractResult(response);
    mountViewer(document.querySelector('canvas'), { ...sceneFromResult(result), axles: axleMarkers(result) });
    renderSummary(document.getElementById('summary'), summarize(result));
  </script>
</body>
</html>
